name: Java
extensions: [.java]
line_comment: "//"
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
icon: mime
filenames: []
index: true
import_style: generic
lsp_command: jdtls
lsp_language_id: java
lsp_args: []
import_keywords: [import]
import_from_keywords: []
import_member_keywords: []
import_roots: [., src, src/main/java]
import_env: [CLASSPATH]
import_extensions: [.java]
import_member_files: []
import_strip_extensions: true
import_dot_modules: false
completions: [abstract, assert, boolean, break, byte, case, catch, char, class, const, continue, default, do, double, else, enum, extends, final, finally, float, for, if, implements, import, instanceof, int, interface, long, native, new, package, private, protected, public, return, short, static, strictfp, super, switch, synchronized, this, throw, throws, transient, try, void, volatile, while, String, Object, List, Map, Set, var, record, sealed, permits, non-sealed, Optional, ArrayList, HashMap, HashSet, Exception, RuntimeException, Override, Deprecated]
line_close_pairs: []
statement_required_enders: [";"]
statement_exempt_prefixes: ["//", "/*", "*", "}", "{", "else", "case ", "default:", "if ", "if(", "for ", "for(", "while ", "while(", "switch ", "switch(", "try", "catch", "finally", "class ", "interface ", "enum ", "record ", "@"]
statement_exempt_suffixes: [";", "{", "}", ":", "*/"]
formatting:
  enabled: true
  scope: selection_or_block
  profile: brace_semicolon
  block_style: braces
  statement_style: semicolon
  brace_style: attach
  one_statement_per_line: true
  space_before_block_opener: true
  space_after_comma: true
  space_after_control_keyword: true
  space_around_binary_operators: true
  space_around_logical_operators: true
  logical_operators: ["&&", "||"]
  binary_operators: ["+", "-", "*", "/", "%", "=", "==", "!=", "<", ">", "<=", ">="]
  unary_prefix_operators: ["!", "~"]
  protected_scopes: [comment, string, character]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: true
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: true
rules:
  - name: comment-block
    scope: comment
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
  - name: comment-line
    scope: comment
    pattern: "//.*$"
    color: "#6A9955"
  - name: string
    scope: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: keyword
    pattern: "(?<![A-Za-z0-9_])(abstract|assert|boolean|break|byte|case|catch|char|class|const|continue|default|do|double|else|enum|extends|final|finally|float|for|if|implements|import|instanceof|int|interface|long|native|new|package|private|protected|public|return|short|static|strictfp|super|switch|synchronized|this|throw|throws|transient|try|void|volatile|while)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
  - name: type
    pattern: "(?<![A-Za-z0-9_])(String|Object|List|Map|Set|Integer|Long|Boolean|Double|Float)(?![A-Za-z0-9_])"
    color: "#4EC9B0"
