name: C++
extensions: [.cpp, .cc, .cxx, .c++, .hpp, .hh, .hxx, .h++]
line_comment: //
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: ["#include <=>>"]
statement_required_enders: [";"]
statement_exempt_prefixes: ["#", "//", "/*", "*", "}", "{", "else", "case ", "default:", "if ", "if(", "for ", "for(", "while ", "while(", "switch ", "switch(", "do", "class ", "struct ", "enum ", "namespace ", "template ", "using "]
statement_exempt_suffixes: [";", "{", "}", ":", "*/"]
icon: mime
filenames: []
index: true
import_style: c_include
lsp_command: clangd
lsp_language_id: cpp
lsp_args: []
import_keywords: ["#include"]
import_from_keywords: []
import_member_keywords: []
import_roots: [., include, src, /usr/include, /usr/local/include]
import_env: [CPATH, CPLUS_INCLUDE_PATH]
import_extensions: [.h, .hpp, .hh, .hxx, .inc]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
completions: [alignas, alignof, and, auto, bool, break, case, catch, char, class, concept, const, constexpr, consteval, constinit, continue, decltype, default, delete, do, double, else, enum, explicit, export, extern, false, float, for, friend, if, inline, int, long, mutable, namespace, new, noexcept, nullptr, operator, private, protected, public, requires, return, short, signed, sizeof, static, struct, switch, template, this, throw, true, try, typedef, typename, union, unsigned, using, virtual, void, volatile, while, std, string, vector, map, unordered_map, unique_ptr, shared_ptr]
formatting:
  enabled: true
  scope: selection_or_block
  profile: brace_semicolon
  block_style: braces
  statement_style: semicolon
  brace_style: attach
  one_statement_per_line: true
  space_before_block_opener: true
  space_after_comma: true
  space_after_control_keyword: true
  space_around_binary_operators: true
  space_around_logical_operators: true
  logical_operators: ["&&", "||"]
  binary_operators: ["+", "-", "*", "/", "%", "=", "==", "!=", "<", ">", "<=", ">="]
  unary_prefix_operators: ["!", "~"]
  protected_scopes: [comment, string, character, preprocessor]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: true
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: true
rules:
  - name: preprocessor
    scope: preprocessor
    pattern: "^[[:space:]]*#[[:space:]]*[A-Za-z_][A-Za-z0-9_]*.*$"
    color: "#C586C0"
    bold: true
  - name: comment-block
    scope: comment
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
    italic: true
  - name: comment-line
    scope: comment
    pattern: "//.*$"
    color: "#6A9955"
    italic: true
  - name: string
    scope: string
    pattern: "(?<![A-Za-z0-9_])(?:u8|u|U|L)?\"(?:\\\\.|[^\"\\\\])*\""
    color: "#CE9178"
  - name: character
    scope: character
    pattern: "(?<![A-Za-z0-9_])(?:u8|u|U|L)?'(?:\\\\.|[^'\\\\])+'"
    color: "#CE9178"
  - name: keyword
    pattern: "(?<![A-Za-z0-9_])(alignas|alignof|asm|auto|bool|break|case|catch|char|class|concept|const|constexpr|consteval|constinit|continue|decltype|default|delete|do|double|else|enum|explicit|export|extern|false|float|for|friend|if|inline|int|long|mutable|namespace|new|noexcept|nullptr|operator|private|protected|public|requires|return|short|signed|sizeof|static|struct|switch|template|this|throw|true|try|typedef|typename|union|unsigned|using|virtual|void|volatile|while)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
  - name: type
    pattern: "(?<![A-Za-z0-9_])(std::string|string|vector|map|unordered_map|set|unordered_set|unique_ptr|shared_ptr|optional|variant|size_t|uint8_t|uint16_t|uint32_t|uint64_t|int8_t|int16_t|int32_t|int64_t)(?![A-Za-z0-9_])"
    color: "#4EC9B0"
  - name: number
    pattern: "(?<![A-Za-z0-9_])(?:0[xX][0-9A-Fa-f']+|[0-9](?:'?[0-9])*(?:\\.[0-9](?:'?[0-9])*)?)(?![A-Za-z0-9_])"
    color: "#B5CEA8"
