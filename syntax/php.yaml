name: PHP
extensions: [.php]
line_comment: "//"
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
icon: mime
filenames: [composer.json]
index: true
import_style: generic
import_keywords: [use, require, require_once, include, include_once]
import_from_keywords: []
import_member_keywords: []
import_roots: [., src, vendor]
import_env: []
import_extensions: [.php]
import_member_files: []
import_strip_extensions: true
import_dot_modules: false
completions: [abstract, and, array, as, break, callable, case, catch, class, clone, const, continue, declare, default, do, echo, else, elseif, empty, enddeclare, endfor, endforeach, endif, endswitch, endwhile, eval, exit, extends, final, finally, fn, for, foreach, function, global, goto, if, implements, include, include_once, instanceof, insteadof, interface, isset, list, match, namespace, new, or, print, private, protected, public, readonly, require, require_once, return, static, switch, throw, trait, try, unset, use, var, while, xor, yield, true, false, null, DateTime, PDO, Exception, Throwable, array_map, array_filter, count, str_contains]
line_close_pairs: []
statement_required_enders: [";"]
statement_exempt_prefixes: ["//", "#", "/*", "*", "}", "{", "else", "elseif ", "if ", "if(", "for ", "foreach ", "while ", "switch ", "case ", "default:", "class ", "interface ", "trait ", "function ", "namespace ", "use "]
statement_exempt_suffixes: [";", "{", "}", ":", "*/"]
rules:
  - name: comment-block
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
  - name: comment-line
    pattern: "//.*$|#.*$"
    color: "#6A9955"
  - name: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: variable
    pattern: "\\$[A-Za-z_][A-Za-z0-9_]*"
    color: "#9CDCFE"
  - name: keyword
    pattern: "(?<![A-Za-z0-9_])(abstract|array|as|break|callable|case|catch|class|clone|const|continue|declare|default|do|echo|else|elseif|empty|extends|final|finally|fn|for|foreach|function|global|if|implements|include|include_once|instanceof|interface|isset|namespace|new|private|protected|public|readonly|require|require_once|return|static|switch|throw|trait|try|unset|use|var|while|yield|true|false|null)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
