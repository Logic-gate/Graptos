# Generated by AI

name: CSS
extensions: [.css, .scss, .sass, .less]
line_comment: "/*"
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
icon: mime
filenames: []
index: true
import_style: generic
lsp_command: vscode-css-language-server
lsp_language_id: css
lsp_args: [--stdio]
import_keywords: [@import]
import_from_keywords: []
import_member_keywords: []
import_roots: [., src, assets, styles]
import_env: []
import_extensions: [.css, .scss, .sass, .less]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
completions: [color, background, display, flex, grid, margin, padding, border, font, width, height, position, absolute, relative, align-items, justify-content, gap, box-sizing, overflow, z-index, transform, transition, animation, @media, @supports, @keyframes, var, calc, rgb, rgba, hsl, hsla, rem, em, px, vh, vw]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["/*", "*", "}", "@media", "@supports", "@keyframes"]
statement_exempt_suffixes: [";", "{", "}", "*/"]
formatting:
  enabled: false
  scope: selection_or_block
  profile: data
  block_style: braces
  statement_style: semicolon
  brace_style: attach
  one_statement_per_line: true
  space_before_block_opener: true
  space_after_comma: true
  space_after_control_keyword: false
  space_around_binary_operators: true
  space_around_logical_operators: false
  logical_operators: []
  binary_operators: [":", "+", "-", "*", "/", "="]
  unary_prefix_operators: []
  protected_scopes: [comment, string]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: true
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: false
rules:
  - name: comment
    scope: comment
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
  - name: selector
    pattern: "^[[:space:]]*[.#]?[A-Za-z_][A-Za-z0-9_-]*[^{]*\\{"
    color: "#DCDCAA"
  - name: property
    pattern: "[A-Za-z-]+[[:space:]]*:"
    color: "#9CDCFE"
  - name: color
    pattern: "#[0-9A-Fa-f]{3,8}"
    color: "#4EC9B0"
  - name: unit
    pattern: (?<![A-Za-z0-9_])[0-9]+(?:\.[0-9]+)?(?:px|em|rem|vh|vw|vmin|vmax|%|s|ms|deg)(?![A-Za-z0-9_])
    color: "#B5CEA8"
  - name: important
    pattern: !important
    color: "#C586C0"
    bold: true
  - name: at-rule
    pattern: @[A-Za-z-]+
    color: "#C586C0"
    bold: true
  - name: function-call
    pattern: (?<![A-Za-z0-9_-])[A-Za-z_-][A-Za-z0-9_-]*[[:space:]]*(?=\()
    color: "#DCDCAA"
