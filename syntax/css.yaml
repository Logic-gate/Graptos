# Generated by AI

name: CSS
extensions: [.css, .scss, .sass, .less]
line_comment: "/*"
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
icon: mime
filenames: []
index: true
import_style: generic
import_keywords: [@import]
import_from_keywords: []
import_member_keywords: []
import_roots: [., src, assets, styles]
import_env: []
import_extensions: [.css, .scss, .sass, .less]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
completions: [color, background, display, flex, grid, margin, padding, border, font, width, height, position, absolute, relative, align-items, justify-content, gap, box-sizing, overflow, z-index, transform, transition, animation, @media, @supports, @keyframes, var, calc, rgb, rgba, hsl, hsla, rem, em, px, vh, vw]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["/*", "*", "}", "@media", "@supports", "@keyframes"]
statement_exempt_suffixes: [";", "{", "}", "*/"]
rules:
  - name: comment
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
  - name: selector
    pattern: "^[[:space:]]*[.#]?[A-Za-z_][A-Za-z0-9_-]*[^{]*\\{"
    color: "#DCDCAA"
  - name: property
    pattern: "[A-Za-z-]+[[:space:]]*:"
    color: "#9CDCFE"
  - name: color
    pattern: "#[0-9A-Fa-f]{3,8}"
    color: "#4EC9B0"
  - name: unit
    pattern: (?<![A-Za-z0-9_])[0-9]+(?:\.[0-9]+)?(?:px|em|rem|vh|vw|vmin|vmax|%|s|ms|deg)(?![A-Za-z0-9_])
    color: "#B5CEA8"
  - name: important
    pattern: !important
    color: "#C586C0"
    bold: true
  - name: at-rule
    pattern: @[A-Za-z-]+
    color: "#C586C0"
    bold: true
  - name: function-call
    pattern: (?<![A-Za-z0-9_-])[A-Za-z_-][A-Za-z0-9_-]*[[:space:]]*(?=\()
    color: "#DCDCAA"
