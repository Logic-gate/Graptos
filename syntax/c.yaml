rules:
- name: comment-doc-block
  pattern: /\*\*(?:[^*]|\*+[^*/])*\*+/
  color: '#6272a4'
  italic: true
- name: comment-block
  pattern: /\*(?:[^*]|\*+[^*/])*\*+/
  color: '#6272a4'
  italic: true
- name: comment-doc-line
  pattern: ///.*$|//!.*$
  color: '#6272a4'
  italic: true
- name: comment-line
  pattern: //.*$
  color: '#6272a4'
  italic: true
- name: todo-note
  pattern: (?<![A-Za-z0-9_])(TODO|FIXME|BUG|HACK|NOTE|XXX|OPTIMIZE|REVIEW)(?![A-Za-z0-9_])
  color: '#D7BA7D'
  bold: true
- name: string
  pattern: (?<![A-Za-z0-9_])(?:u8|u|U|L)?"(?:\\.|[^"\\])*"
  color: '#f1fa8c'
- name: character
  pattern: (?<![A-Za-z0-9_])(?:u8|u|U|L)?'(?:\\.|[^'\\])+'
  color: '#CE9178'
- name: escape-sequence
  pattern: \\(?:[abfnrtv\\\'"?]|[0-7]{1,3}|x[0-9A-Fa-f]+|u[0-9A-Fa-f]{4}|U[0-9A-Fa-f]{8})
  color: '#D7BA7D'
  bold: true
- name: preprocessor
  pattern: ^[[:space:]]*#[[:space:]]*[A-Za-z_][A-Za-z0-9_]*.*$
  color: '#C586C0'
  bold: true
- name: preprocessor-directive
  pattern: ^[[:space:]]*#[[:space:]]*(include|define|undef|ifdef|ifndef|if|elif|elifdef|elifndef|else|endif|error|warning|pragma|line)(?![A-Za-z0-9_])
  color: '#C586C0'
  bold: true
- name: include-path
  pattern: ^[[:space:]]*#[[:space:]]*include[[:space:]]+(<[^>]+>|"[^"]+")
  color: '#CE9178'
- name: macro-definition
  pattern: ^[[:space:]]*#[[:space:]]*define[[:space:]]+[A-Za-z_][A-Za-z0-9_]*(?=[[:space:]\(]|$)
  color: '#DCDCAA'
  bold: true
- name: preprocessor-builtin
  pattern: (?<![A-Za-z0-9_])(__FILE__|__LINE__|__DATE__|__TIME__|__STDC__|__STDC_VERSION__|__func__|__VA_ARGS__|__VA_OPT__|__has_include|__has_c_attribute|defined)(?![A-Za-z0-9_])
  color: '#DCDCAA'
- name: control-keyword
  pattern: (?<![A-Za-z0-9_])(break|case|continue|default|do|else|for|goto|if|return|switch|while)(?![A-Za-z0-9_])
  color: '#C586C0'
  bold: true
- name: storage-keyword
  pattern: (?<![A-Za-z0-9_])(auto|const|extern|inline|register|restrict|static|typedef|volatile|_Atomic|_Thread_local|thread_local)(?![A-Za-z0-9_])
  color: '#569CD6'
  bold: true
- name: aggregate-keyword
  pattern: (?<![A-Za-z0-9_])(enum|struct|union)(?![A-Za-z0-9_])
  color: '#569CD6'
  bold: true
- name: operator-keyword
  pattern: (?<![A-Za-z0-9_])(sizeof|_Alignof|alignof|typeof|typeof_unqual|_Generic|_Static_assert|static_assert)(?![A-Za-z0-9_])
  color: '#569CD6'
  bold: true
- name: primitive-type
  pattern: (?<![A-Za-z0-9_])(void|char|short|int|long|float|double|signed|unsigned|_Bool|_Complex|_Imaginary|bool)(?![A-Za-z0-9_])
  color: '#4EC9B0'
  bold: true
- name: c23-keyword
  pattern: (?<![A-Za-z0-9_])(alignas|constexpr|nullptr)(?![A-Za-z0-9_])
  color: '#569CD6'
  bold: true
- name: standard-type
  pattern: (?<![A-Za-z0-9_])(FILE|fpos_t|size_t|ssize_t|ptrdiff_t|wchar_t|wint_t|mbstate_t|max_align_t|va_list|jmp_buf|sig_atomic_t|time_t|clock_t|div_t|ldiv_t|lldiv_t|errno_t|rsize_t)(?![A-Za-z0-9_])
  color: '#4EC9B0'
- name: fixed-width-type
  pattern: (?<![A-Za-z0-9_])((u?int(8|16|32|64)_t)|(u?int_(least|fast)(8|16|32|64)_t)|u?intptr_t|u?intmax_t)(?![A-Za-z0-9_])
  color: '#4EC9B0'
- name: posix-type
  pattern: (?<![A-Za-z0-9_])(pid_t|uid_t|gid_t|mode_t|off_t|dev_t|ino_t|nlink_t|blksize_t|blkcnt_t|useconds_t|suseconds_t|socklen_t|sa_family_t|pthread_t|pthread_mutex_t|pthread_cond_t|pthread_rwlock_t|DIR)(?![A-Za-z0-9_])
  color: '#4EC9B0'
- name: glib-type
  pattern: (?<![A-Za-z0-9_])(gboolean|gchar|guchar|gint|guint|glong|gulong|gshort|gushort|gsize|gssize|goffset|gintptr|guintptr|gfloat|gdouble|gpointer|gconstpointer|gint8|guint8|gint16|guint16|gint32|guint32|gint64|guint64|GList|GSList|GHashTable|GArray|GPtrArray|GString|GError|GObject|GType|GVariant|GtkWidget|GtkWindow|GtkApplication|GtkBox|GtkButton|GtkLabel|GtkEntry|GtkTextView|GtkSourceView)(?![A-Za-z0-9_])
  color: '#4EC9B0'
- name: boolean-null-constant
  pattern: (?<![A-Za-z0-9_])(NULL|nullptr|true|false)(?![A-Za-z0-9_])
  color: '#B5CEA8'
  bold: true
- name: stdio-constant
  pattern: (?<![A-Za-z0-9_])(EOF|stdin|stdout|stderr|SEEK_SET|SEEK_CUR|SEEK_END|BUFSIZ|FILENAME_MAX|FOPEN_MAX)(?![A-Za-z0-9_])
  color: '#B5CEA8'
- name: stdlib-constant
  pattern: (?<![A-Za-z0-9_])(EXIT_SUCCESS|EXIT_FAILURE|RAND_MAX)(?![A-Za-z0-9_])
  color: '#B5CEA8'
- name: integer-limit-constant
  pattern: (?<![A-Za-z0-9_])(CHAR_BIT|SCHAR_MIN|SCHAR_MAX|UCHAR_MAX|SHRT_MIN|SHRT_MAX|USHRT_MAX|INT_MIN|INT_MAX|UINT_MAX|LONG_MIN|LONG_MAX|ULONG_MAX|LLONG_MIN|LLONG_MAX|ULLONG_MAX|SIZE_MAX|PTRDIFF_MIN|PTRDIFF_MAX|INTPTR_MIN|INTPTR_MAX|UINTPTR_MAX|INTMAX_MIN|INTMAX_MAX|UINTMAX_MAX)(?![A-Za-z0-9_])
  color: '#B5CEA8'
- name: macro-constant
  pattern: (?<![A-Za-z0-9_])[A-Z_][A-Z0-9_]{2,}(?![A-Za-z0-9_])
  color: '#DCDCAA'
- name: number-hex-float
  pattern: (?<![A-Za-z0-9_])0[xX](?:[0-9A-Fa-f]+\.?[0-9A-Fa-f]*|\.[0-9A-Fa-f]+)[pP][+-]?[0-9]+[fFlL]?(?![A-Za-z0-9_])
  color: '#bd93f9'
- name: number-hex
  pattern: (?<![A-Za-z0-9_])0[xX][0-9A-Fa-f]+(?:[uU](?:ll|LL|l|L)?|(?:ll|LL|l|L)[uU]?)?(?![A-Za-z0-9_])
  color: '#bd93f9'
- name: number-binary
  pattern: (?<![A-Za-z0-9_])0[bB][01]+(?:[uU](?:ll|LL|l|L)?|(?:ll|LL|l|L)[uU]?)?(?![A-Za-z0-9_])
  color: '#bd93f9'
- name: number-octal
  pattern: (?<![A-Za-z0-9_])0[0-7]+(?:[uU](?:ll|LL|l|L)?|(?:ll|LL|l|L)[uU]?)?(?![A-Za-z0-9_])
  color: '#bd93f9'
- name: number-float
  pattern: (?<![A-Za-z0-9_])(?:(?:[0-9]+\.[0-9]*|\.[0-9]+)(?:[eE][+-]?[0-9]+)?|[0-9]+[eE][+-]?[0-9]+)[fFlL]?(?![A-Za-z0-9_])
  color: '#bd93f9'
- name: number-decimal
  pattern: (?<![A-Za-z0-9_])[1-9][0-9]*(?:[uU](?:ll|LL|l|L)?|(?:ll|LL|l|L)[uU]?)?(?![A-Za-z0-9_])
  color: '#bd93f9'
- name: attribute
  pattern: (?<![A-Za-z0-9_])(__attribute__|__declspec|__asm__|__asm|asm|__inline__|__restrict__|__typeof__|__extension__|__builtin_[A-Za-z0-9_]+)(?![A-Za-z0-9_])
  color: '#C586C0'
- name: function-call
  pattern: (?<![A-Za-z0-9_])(?!(auto|break|case|char|const|continue|default|do|double|else|enum|extern|float|for|goto|if|inline|int|long|register|restrict|return|short|signed|sizeof|static|struct|switch|typedef|union|unsigned|void|volatile|while|_Bool|_Complex|_Imaginary|bool)[[:space:]]*\()[A-Za-z_][A-Za-z0-9_]*[[:space:]]*(?=\()
  color: '#DCDCAA'
- name: aggregate-name
  pattern: (?<![A-Za-z0-9_])(struct|enum|union)[[:space:]]+[A-Za-z_][A-Za-z0-9_]*(?![A-Za-z0-9_])
  color: '#4EC9B0'
- name: member-access
  pattern: (\.|->)[[:space:]]*[A-Za-z_][A-Za-z0-9_]*
  color: '#9CDCFE'
- name: label
  pattern: ^[[:space:]]*[A-Za-z_][A-Za-z0-9_]*[[:space:]]*:(?!:)
  color: '#D7BA7D'
- name: operator
  pattern: (\+\+|--|->|==|!=|<=|>=|&&|\|\||<<|>>|\+=|-=|\*=|/=|%=|&=|\|=|\^=|<<=|>>=|[+\-*/%=&|^~!<>?:])
  color: '#D4D4D4'
- name: bracket
  pattern: '[{}\[\]()]'
  color: '#D4D4D4'
- name: punctuation
  pattern: '[,;]'
  color: '#808080'