name: C
extensions:
- .c
- .h
- .i
line_comment: //
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: ["#include <=>>"]
statement_required_enders: [";"]
