name: YAML
extensions: [.yaml, .yml]
line_comment: "#"
icon: mime
filenames: []
index: true
import_style: generic
lsp_command: yaml-language-server
lsp_language_id: yaml
lsp_args: [--stdio]
completions: [true, false, null, yes, no, on, off, name, extensions, filenames, icon, index, line_comment, completions, keywords, rules, pattern, color, bold, italic, underline, import_style, auto_indent, close_pairs, statement_required_enders]
auto_indent: true
indent_openers: [":"]
indent_closers: []
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["#", "-", "---", "..."]
statement_exempt_suffixes: [":"]
import_keywords: []
import_from_keywords: []
import_member_keywords: []
import_roots: [.]
import_env: []
import_extensions: [.yaml, .yml]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
formatting:
  enabled: true
  scope: selection_or_block
  profile: indent_colon
  block_style: indent
  statement_style: newline
  brace_style: attach
  one_statement_per_line: false
  space_before_block_opener: true
  space_after_comma: true
  space_after_control_keyword: false
  space_around_binary_operators: false
  space_around_logical_operators: false
  logical_operators: []
  binary_operators: [":"]
  unary_prefix_operators: []
  protected_scopes: [comment, string]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: true
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: false
rules:
  - name: comment
    scope: comment
    pattern: "#.*$"
    color: "#8b949e"
  - name: key
    pattern: "^[[:space:]]*[A-Za-z0-9_.-]+[[:space:]]*:"
    color: "#7ee787"
    bold: true
  - name: string
    scope: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#a5d6ff"
  - name: boolean
    pattern: "(?<![A-Za-z0-9_])(true|false|null|yes|no|on|off)(?![A-Za-z0-9_])"
    color: "#79c0ff"
    bold: true
    italic: true
  - name: number
    pattern: "(?<![A-Za-z0-9_])-?[0-9]+(\\.[0-9]+)?(?![A-Za-z0-9_])"
    color: "#79c0ff"
  - name: list-marker
    pattern: "^[[:space:]]*-"
    color: "#ff7b72"
  - name: anchor-alias
    pattern: "[&*][A-Za-z0-9_-]+"
    color: "#d2a8ff"
  - name: document-marker
    pattern: "^(---|\.\.\.)$"
    color: "#ff7b72"
    bold: true
