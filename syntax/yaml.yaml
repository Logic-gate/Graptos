name: YAML
extensions: [.yaml, .yml]
line_comment: "#"
icon: mime
filenames: []
index: true
import_style: generic
completions: [true, false, null, yes, no, on, off, name, extensions, filenames, icon, index, line_comment, completions, keywords, rules, pattern, color, bold, italic, underline, import_style, auto_indent, close_pairs, statement_required_enders]
auto_indent: true
indent_openers: [":"]
indent_closers: []
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["#", "-", "---", "..."]
statement_exempt_suffixes: [":"]
import_keywords: []
import_from_keywords: []
import_member_keywords: []
import_roots: [.]
import_env: []
import_extensions: [.yaml, .yml]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
rules:
  - name: comment
    pattern: "#.*$"
    color: "#6A9955"
  - name: key
    pattern: "^[[:space:]]*[A-Za-z0-9_.-]+[[:space:]]*:"
    color: "#9CDCFE"
    bold: true
  - name: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: boolean
    pattern: "(?<![A-Za-z0-9_])(true|false|null|yes|no|on|off)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
  - name: number
    pattern: "(?<![A-Za-z0-9_])-?[0-9]+(\\.[0-9]+)?(?![A-Za-z0-9_])"
    color: "#B5CEA8"
  - name: list-marker
    pattern: "^[[:space:]]*-"
    color: "#DCDCAA"
  - name: anchor-alias
    pattern: "[&*][A-Za-z0-9_-]+"
    color: "#DCDCAA"
  - name: document-marker
    pattern: "^(---|\.\.\.)$"
    color: "#C586C0"
    bold: true
