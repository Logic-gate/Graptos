name: SQL
extensions: [.sql]
line_comment: "--"
icon: mime
filenames: []
index: true
import_style: generic
completions: [select, insert, update, delete, create, alter, drop, table, view, index, from, where, join, left, right, inner, outer, on, group, by, order, having, limit, offset, union, all, distinct, as, and, or, not, null, primary, key, foreign, references, constraint, varchar, integer, bigint, boolean, timestamp, date, text, with, recursive, count, sum, avg, min, max]
auto_indent: true
indent_openers: ["("]
indent_closers: [")"]
close_pairs: ["(=>)"]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["--", "/*", "*", "WITH ", "SELECT ", "FROM ", "WHERE ", "JOIN ", "GROUP ", "ORDER "]
statement_exempt_suffixes: [";", ",", "(", ")", "*/"]
import_keywords: []
import_from_keywords: []
import_member_keywords: []
import_roots: [., sql, migrations]
import_env: []
import_extensions: [.sql]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
rules:
  - name: comment-line
    pattern: "--.*$"
    color: "#6A9955"
  - name: string
    pattern: "'(?:''|[^'])*'|\"(?:\\\\.|[^\"\\\\])*\""
    color: "#CE9178"
  - name: keyword
    pattern: "(?i)(?<![A-Za-z0-9_])(select|insert|update|delete|create|alter|drop|table|view|index|from|where|join|left|right|inner|outer|on|group|by|order|having|limit|offset|union|all|distinct|as|and|or|not|null|primary|key|foreign|references|constraint)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
  - name: number
    pattern: "(?<![A-Za-z0-9_])-?[0-9]+(\\.[0-9]+)?(?![A-Za-z0-9_])"
    color: "#B5CEA8"
