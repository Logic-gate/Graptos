name: TOML
extensions: [.toml]
line_comment: "#"
icon: mime
filenames: [Cargo.toml, pyproject.toml]
index: true
import_style: generic
lsp_command: taplo
lsp_language_id: toml
lsp_args: [lsp, stdio]
completions: [true, false, name, version, dependencies, dev-dependencies, package, workspace, scripts, tool, build-system, description, project, authors, license, repository]
auto_indent: false
indent_openers: []
indent_closers: []
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["#", "["]
statement_exempt_suffixes: []
import_keywords: []
import_from_keywords: []
import_member_keywords: []
import_roots: [.]
import_env: []
import_extensions: [.toml]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
formatting:
  enabled: false
  scope: selection_or_block
  profile: data
  block_style: none
  statement_style: newline
  brace_style: attach
  one_statement_per_line: false
  space_before_block_opener: false
  space_after_comma: true
  space_after_control_keyword: false
  space_around_binary_operators: true
  space_around_logical_operators: false
  logical_operators: []
  binary_operators: ["="]
  unary_prefix_operators: []
  protected_scopes: [comment, string]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: true
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: false
rules:
  - name: comment
    scope: comment
    pattern: "#.*$"
    color: "#6A9955"
  - name: section
    pattern: "^\\s*\\[[^]]+\\]"
    color: "#569CD6"
    bold: true
  - name: key
    pattern: "^[[:space:]]*[A-Za-z0-9_.-]+[[:space:]]*="
    color: "#9CDCFE"
    bold: true
  - name: string
    scope: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: boolean
    pattern: "(?<![A-Za-z0-9_])(true|false)(?![A-Za-z0-9_])"
    color: "#569CD6"
    italic: true
  - name: datetime
    pattern: "(?<![A-Za-z0-9_])[0-9]{4}-[0-9]{2}-[0-9]{2}(?:T[0-9:.+-]+Z?)?(?![A-Za-z0-9_])"
    color: "#B5CEA8"
