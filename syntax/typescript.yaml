name: TypeScript
extensions: [.ts, .tsx, .mts, .cts]
line_comment: "//"
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
icon: mime
filenames: []
index: true
import_style: js_module
lsp_command: typescript-language-server
lsp_language_id: typescript
lsp_args: [--stdio]
import_keywords: [import, export, require]
import_from_keywords: []
import_member_keywords: [from]
import_roots: [., node_modules, src, lib, $NODE_PATH]
import_env: [NODE_PATH]
import_extensions: [.ts, .tsx, .mts, .cts, .js, .jsx, .mjs, .cjs, .json, .d.ts]
import_member_files: [index.ts, index.tsx, index.d.ts, index.js, package.json]
import_strip_extensions: true
import_dot_modules: false
completions: [import, export, from, const, let, var, function, class, interface, type, enum, extends, implements, return, async, await, Promise, string, number, boolean, unknown, any, never, void, private, public, protected, readonly, abstract, namespace, declare, keyof, typeof, as, satisfies, Record, Array, Map, Set, Partial, Pick, Omit, Required, ReadonlyArray, Readonly, Exclude, Extract, NonNullable, ReturnType, Parameters, Awaited, ReactNode, FC]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["//", "/*", "*", "}", "{", "else", "case ", "default:", "if ", "if(", "for ", "for(", "while ", "while(", "switch ", "switch(", "try", "catch", "finally", "function ", "class ", "interface ", "type ", "enum ", "export ", "import "]
statement_exempt_suffixes: [";", "{", "}", ":", ",", "*/"]
formatting:
  enabled: true
  scope: selection_or_block
  profile: brace_optional_semicolon
  block_style: braces
  statement_style: optional_semicolon
  brace_style: attach
  one_statement_per_line: true
  space_before_block_opener: true
  space_after_comma: true
  space_after_control_keyword: true
  space_around_binary_operators: true
  space_around_logical_operators: true
  logical_operators: ["&&", "||"]
  binary_operators: ["+", "-", "*", "/", "%", "=", "==", "!=", "<", ">", "<=", ">="]
  unary_prefix_operators: ["!", "~"]
  protected_scopes: [comment, string]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: true
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: true
rules:
  - name: comment-block
    scope: comment
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
  - name: comment-line
    scope: comment
    pattern: "//.*$"
    color: "#6A9955"
  - name: string
    scope: string
    pattern: "`(?:\\\\.|[^`\\\\])*`|\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: keyword
    pattern: "(?<![A-Za-z0-9_])(import|export|from|const|let|var|function|class|interface|type|enum|extends|implements|return|if|else|for|while|switch|case|break|continue|try|catch|finally|throw|async|await|new|this|super)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
  - name: type
    pattern: "(?<![A-Za-z0-9_])(string|number|boolean|unknown|any|never|void|Promise|Record|Array|Map|Set)(?![A-Za-z0-9_])"
    color: "#4EC9B0"
  - name: number
    pattern: "(?<![A-Za-z0-9_])-?[0-9]+(\\.[0-9]+)?(?![A-Za-z0-9_])"
    color: "#B5CEA8"
  - name: todo-note
    pattern: (?<![A-Za-z0-9_])(TODO|FIXME|BUG|HACK|NOTE|XXX|REVIEW)(?![A-Za-z0-9_])
    color: "#D7BA7D"
    bold: true
  - name: utility-type
    pattern: (?<![A-Za-z0-9_])(ReadonlyArray|Readonly|Record|Partial|Required|Pick|Omit|Exclude|Extract|NonNullable|ReturnType|Parameters|Awaited)(?![A-Za-z0-9_])
    color: "#4EC9B0"
