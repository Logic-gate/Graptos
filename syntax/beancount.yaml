name: Beancount
extensions: [.beancount, .bean]
line_comment: ";"
icon: mime
filenames: []
index: true
import_style: generic
completions: [open, close, commodity, pad, balance, event, price, note, document, query, custom, txn, option, plugin, include, pushtag, poptag, Assets, Liabilities, Equity, Income, Expenses, USD, EUR, GBP, JPY, BTC, CAD, AUD, CHF]
auto_indent: false
indent_openers: []
indent_closers: []
close_pairs: ["(=>)", "{=>}", "[=>]", '"=>"', "'=>'"]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: [";", "option ", "plugin ", "include ", "pushtag ", "poptag "]
statement_exempt_suffixes: []
import_keywords: [include]
import_from_keywords: []
import_member_keywords: []
import_roots: [.]
import_env: []
import_extensions: [.beancount, .bean]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
formatting:
  enabled: false
  scope: selection_or_block
  profile: data
  block_style: none
  statement_style: none
  brace_style: attach
  one_statement_per_line: false
  space_before_block_opener: false
  space_after_comma: true
  space_after_control_keyword: false
  space_around_binary_operators: false
  space_around_logical_operators: false
  logical_operators: []
  binary_operators: []
  unary_prefix_operators: []
  protected_scopes: [comment, string]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 0
  wrap_after_comma: false
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: false
rules:
  - name: comment
    scope: comment
    pattern: ";.*$"
    color: "#6A9955"
    italic: true
  - name: string
    scope: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: date
    pattern: "(?<![A-Za-z0-9_])[0-9]{4}-[0-9]{2}-[0-9]{2}(?![A-Za-z0-9_])"
    color: "#B5CEA8"
  - name: directive
    pattern: "(?<![A-Za-z0-9_])(open|close|commodity|pad|balance|event|price|note|document|query|custom|txn|option|plugin|include|pushtag|poptag)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
  - name: transaction-flag
    pattern: "^[[:space:]]*[0-9]{4}-[0-9]{2}-[0-9]{2}[[:space:]]+([*!&?#%]|txn)(?=[[:space:]])"
    color: "#DCDCAA"
    bold: true
  - name: account
    pattern: "(?<![A-Za-z0-9_-])(Assets|Liabilities|Equity|Income|Expenses)(?::[A-Z][A-Za-z0-9_-]*)+(?![A-Za-z0-9_-])"
    color: "#4FC1FF"
  - name: metadata-key
    pattern: "^[[:space:]]+[A-Za-z_][A-Za-z0-9_-]*:"
    color: "#9CDCFE"
  - name: tag
    pattern: "(?<![A-Za-z0-9_])#[A-Za-z0-9_-]+"
    color: "#C586C0"
  - name: link
    pattern: "(?<![A-Za-z0-9_])\\^[A-Za-z0-9_-]+"
    color: "#D7BA7D"
  - name: amount
    pattern: "(?<![A-Za-z0-9_])-?[0-9][0-9,]*(?:\\.[0-9]+)?(?![A-Za-z0-9_])"
    color: "#B5CEA8"
  - name: commodity
    pattern: "(?<![A-Za-z0-9_])[A-Z][A-Z0-9._'-]{1,}(?![A-Za-z0-9_])"
    color: "#DCDCAA"
  - name: price-annotation
    pattern: "@@?|\\{[^}]*\\}"
    color: "#C586C0"
  - name: todo-note
    pattern: "(?<![A-Za-z0-9_])(TODO|FIXME|BUG|HACK|NOTE|XXX|REVIEW)(?![A-Za-z0-9_])"
    color: "#D7BA7D"
    bold: true
