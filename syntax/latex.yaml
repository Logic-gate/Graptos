name: LaTeX
extensions: [.tex, .latex, .sty, .cls]
filenames: []
line_comment: "%"
icon: mime
index: true
import_style: generic
completions: [documentclass, usepackage, begin, end, section, subsection, subsubsection, paragraph, textbf, textit, emph, item, itemize, enumerate, figure, table, label, ref, cite, footnote, frac, sqrt, sum, int, alpha, beta, gamma, delta, epsilon, theta, lambda, mu, pi, sigma, omega, includegraphics, caption, equation, align, bibliography]
auto_indent: true
indent_openers: ["\begin{"]
indent_closers: ["\end{"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: ["\begin{=>}"]
statement_required_enders: []
statement_exempt_prefixes: ["%"]
statement_exempt_suffixes: []
import_keywords: [\input, \include, \usepackage, \bibliography, \addbibresource]
import_from_keywords: []
import_member_keywords: []
import_roots: [., tex, chapters, sections, figures, images]
import_env: [TEXINPUTS, BIBINPUTS]
import_extensions: [.tex, .sty, .cls, .bib]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
rules:
  - name: comment-line
    pattern: "%.*$"
    color: "#6A9955"
    italic: true
  - name: command
    pattern: "\\\\[A-Za-z]+\\*?"
    color: "#569CD6"
    bold: true
  - name: environment
    pattern: "\\\\(begin|end)\\s*\\{[A-Za-z*]+\\}"
    color: "#C586C0"
    bold: true
    italic: true
  - name: math-block
    pattern: "\\$\\$[^$]*\\$\\$|\\\\\\[[\\s\\S]*?\\\\\\]"
    color: "#DCDCAA"
  - name: math-inline
    pattern: "\\$[^$\\n]+\\$|\\\\\\([^\\n]*?\\\\\\)"
    color: "#DCDCAA"
  - name: braces
    pattern: "[{}\\[\\]()]"
    color: "#D4D4D4"
  - name: comment
    pattern: "%.*$"
    color: "#6A9955"
    italic: true
  - name: command
    pattern: "\\[A-Za-z]+\*?"
    color: "#569CD6"
    bold: true
  - name: environment
    pattern: "\\(begin|end)\{[A-Za-z*]+\}"
    color: "#C586C0"
    bold: true
  - name: math-inline
    pattern: "\$[^$]+\$"
    color: "#CE9178"
