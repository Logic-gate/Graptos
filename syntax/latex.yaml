name: LaTeX
extensions: [.tex, .latex, .sty, .cls]
filenames: []
line_comment: "%"
icon: mime
index: true
import_style: generic
completions: [documentclass, usepackage, begin, end, section, subsection, subsubsection, paragraph, textbf, textit, emph, item, itemize, enumerate, figure, table, label, ref, cite, footnote, frac, sqrt, sum, int, alpha, beta, gamma, delta, epsilon, theta, lambda, mu, pi, sigma, omega, includegraphics, caption, equation, align, bibliography]
auto_indent: true
indent_openers: ["\begin{"]
indent_closers: ["\end{"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: ["\begin{=>}"]
statement_required_enders: []
statement_exempt_prefixes: ["%"]
statement_exempt_suffixes: []
import_keywords: [\input, \include, \usepackage, \bibliography, \addbibresource]
import_from_keywords: []
import_member_keywords: []
import_roots: [., tex, chapters, sections, figures, images]
import_env: [TEXINPUTS, BIBINPUTS]
import_extensions: [.tex, .sty, .cls, .bib]
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
formatting:
  enabled: false
  scope: selection_or_block
  profile: markup
  block_style: tags
  statement_style: none
  brace_style: attach
  one_statement_per_line: false
  space_before_block_opener: false
  space_after_comma: false
  space_after_control_keyword: false
  space_around_binary_operators: false
  space_around_logical_operators: false
  logical_operators: []
  binary_operators: []
  unary_prefix_operators: []
  protected_scopes: [comment, string]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: false
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: false
rules:
  - name: comment-line
    scope: comment
    pattern: "%.*$"
    color: "#6A9955"
    italic: true
  - name: command
    pattern: "\\\\[A-Za-z]+\\*?"
    color: "#569CD6"
    bold: true
  - name: environment
    pattern: "\\\\(begin|end)\\s*\\{[A-Za-z*]+\\}"
    color: "#C586C0"
    bold: true
    italic: true
  - name: math-block
    pattern: "\\$\\$[^$]*\\$\\$|\\\\\\[[\\s\\S]*?\\\\\\]"
    color: "#DCDCAA"
  - name: math-inline
    pattern: "\\$[^$\\n]+\\$|\\\\\\([^\\n]*?\\\\\\)"
    color: "#DCDCAA"
  - name: braces
    pattern: "[{}\\[\\]()]"
    color: "#D4D4D4"
  - name: comment
    scope: comment
    pattern: "%.*$"
    color: "#6A9955"
    italic: true
  - name: command
    pattern: "\\[A-Za-z]+\*?"
    color: "#569CD6"
    bold: true
  - name: environment
    pattern: "\\(begin|end)\{[A-Za-z*]+\}"
    color: "#C586C0"
    bold: true
  - name: math-inline
    pattern: "\$[^$]+\$"
    color: "#CE9178"
