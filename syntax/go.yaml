name: Go
extensions: [.go]
line_comment: "//"
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
icon: mime
filenames: [go.mod, go.sum]
index: true
import_style: generic
import_keywords: [import]
import_from_keywords: []
import_member_keywords: []
import_roots: [., $GOPATH/src, /usr/local/go/src]
import_env: [GOPATH]
import_extensions: [.go]
import_member_files: []
import_strip_extensions: true
import_dot_modules: false
completions: [package, import, func, var, const, type, struct, interface, map, chan, go, defer, select, case, default, if, else, for, range, switch, return, break, continue, fallthrough, nil, true, false, error, string, int, int64, bool, make, new, append, len, cap, copy, delete, panic, recover, context, fmt, any, comparable, Println, Printf, Errorf, ReadFile, WriteFile, context.Context]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["//", "/*", "*", "}", "{", "else", "case ", "default:", "if ", "for ", "switch ", "select ", "func ", "type ", "var ", "const "]
statement_exempt_suffixes: [";", "{", "}", ":", "*/"]
rules:
  - name: comment-block
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
  - name: comment-line
    pattern: "//.*$"
    color: "#6A9955"
  - name: string
    pattern: "`(?:\\\\.|[^`\\\\])*`|\"(?:\\\\.|[^\"\\\\])*\""
    color: "#CE9178"
  - name: keyword
    pattern: "(?<![A-Za-z0-9_])(package|import|func|var|const|type|struct|interface|map|chan|go|defer|select|case|default|if|else|for|range|switch|return|break|continue|fallthrough|nil|true|false)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
  - name: type
    pattern: "(?<![A-Za-z0-9_])(string|int|int8|int16|int32|int64|uint|uint8|uint16|uint32|uint64|bool|byte|rune|error|float32|float64)(?![A-Za-z0-9_])"
    color: "#4EC9B0"
