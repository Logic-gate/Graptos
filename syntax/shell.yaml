name: Shell
extensions: [.sh, .bash]
line_comment: "#"
icon: mime
filenames: [Makefile, Dockerfile, .env]
index: true
import_style: shell_source
lsp_command: bash-language-server
lsp_language_id: shellscript
lsp_args: [start]
import_keywords: [source, .]
import_from_keywords: []
import_member_keywords: []
import_roots: [., scripts, bin]
import_env: [PATH]
import_extensions: [.sh, .bash, .zsh, .env]
import_member_files: []
import_strip_extensions: true
import_dot_modules: false
completions: [if, then, else, elif, fi, for, while, do, done, case, esac, function, select, until, in, sudo, cd, ls, grep, awk, sed, cat, echo, printf, find, xargs, tar, curl, wget, git, make, meson, ninja, export, source, chmod, chown, mkdir, rmdir, rm, cp, mv, test, true, false, trap, set, unset, local, readonly, read, [[, ]], shift, getopts, basename, dirname, realpath, systemctl, journalctl, ssh, scp, rsync]
auto_indent: true
indent_openers: ["then", "do", "case"]
indent_closers: ["fi", "done", "esac"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["#", "if ", "for ", "while ", "case ", "function "]
statement_exempt_suffixes: ["then", "do", ";", "\\"]
formatting:
  enabled: false
  scope: selection_or_block
  profile: plain
  block_style: indent
  statement_style: newline
  brace_style: attach
  one_statement_per_line: false
  space_before_block_opener: false
  space_after_comma: false
  space_after_control_keyword: true
  space_around_binary_operators: false
  space_around_logical_operators: true
  logical_operators: ["&&", "||"]
  binary_operators: ["="]
  unary_prefix_operators: ["!"]
  protected_scopes: [comment, string]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: false
  case_indent: 0
  preserve_blank_lines: true
  max_blank_lines: 0
  collapse_empty_blocks: false
rules:
  - name: comment
    scope: comment
    pattern: "#.*$"
    color: "#6A9955"
  - name: string
    scope: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: keyword
    pattern: "(?<![A-Za-z0-9_])(if|then|else|elif|fi|for|while|do|done|case|esac|function|select|until|in)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
  - name: variable
    pattern: "\\$[A-Za-z_][A-Za-z0-9_]*|\\$\\{[^}]+\\}"
    color: "#9CDCFE"
  - name: command
    pattern: "(?<![A-Za-z0-9_])(sudo|cd|ls|grep|awk|sed|cat|echo|printf|find|xargs|tar|curl|wget|git|make|meson|ninja)(?![A-Za-z0-9_])"
    color: "#DCDCAA"
  - name: option
    pattern: "(?<![A-Za-z0-9_])--?[A-Za-z0-9][A-Za-z0-9_-]*"
    color: "#D7BA7D"
  - name: number
    pattern: "(?<![A-Za-z0-9_])-?[0-9]+(\.[0-9]+)?(?![A-Za-z0-9_])"
    color: "#B5CEA8"
