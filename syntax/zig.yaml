# Zig language configuration for Graptoς
# Targets Zig 0.16.x syntax and standard-library conventions.

name: Zig
extensions:
- .zig
- .zon
line_comment: //
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]", '"=>"', "'=>'"]
line_close_pairs: []
statement_required_enders: [";"]
statement_exempt_prefixes:
- "//"
- "///"
- "//!"
- "}"
- "{"
- "else"
- "switch"
- "while"
- "for"
- "if"
- "comptime"
statement_exempt_suffixes:
- ";"
- "{"
- "}"
- ":"
- ","
icon: mime
filenames:
- build.zig
- build.zig.zon
index: true
# Graptoς needs a Zig-aware resolver for semantic @import completion.
# Until that resolver exists, this metadata exposes quoted Zig paths.
import_style: quoted
lsp_command: /home/mad-dev/Projects/zls/zig-out/bin/zls
lsp_language_id: zig
lsp_args: []
import_keywords:
- "@import"
import_from_keywords: []
import_member_keywords: []
import_roots:
- .
- src
- lib
- zig-out
- zig-cache
- .zig-cache
import_env:
- ZIG_LIB_DIR
- ZIG_GLOBAL_CACHE_DIR
- ZIG_LOCAL_CACHE_DIR
import_extensions:
- .zig
- .zon
import_member_files: []
import_strip_extensions: false
import_dot_modules: false
import_static_modules:
- std=ArrayList|ArrayListUnmanaged|AutoHashMap|AutoHashMapUnmanaged|StringHashMap|StringHashMapUnmanaged|MultiArrayList|PriorityQueue|DynamicBitSet|StaticBitSet|EnumSet|EnumMap|heap|mem|fmt|debug|log|testing|math|crypto|hash|json|zig|Build|fs|Io|net|process|Thread|time|unicode|ascii|sort|Random|Uri|http|tar|zip|compress|coff|elf|macho|wasm|posix
- builtin=mode|target|cpu|os|abi|object_format|link_mode|is_test|single_threaded|zig_backend|output_mode
- root=

formatting:
  enabled: true
  scope: selection_or_block
  profile: brace_semicolon
  block_style: braces
  statement_style: semicolon
  brace_style: attach
  one_statement_per_line: true
  space_before_block_opener: true
  space_after_comma: true
  space_after_control_keyword: true
  space_around_binary_operators: true
  space_around_logical_operators: true
  logical_operators: ["and", "or"]
  binary_operators: ["+", "-", "*", "/", "%", "=", "==", "!=", "<", ">", "<=", ">="]
  unary_prefix_operators: ["!", "~"]
  protected_scopes: [comment, string, character]
  pointer_alignment: name
  continuation_indent: 4
  max_column: 100
  wrap_after_comma: true
  case_indent: 0
  preserve_blank_lines: false
  max_blank_lines: 0
  collapse_empty_blocks: true

