rules:
- name: comment-doc-line
  pattern: '///.*$|//!.*$'
  color: '#8b949e'
  italic: true
- name: comment-line
  pattern: '//.*$'
  color: '#8b949e'
  italic: true
- name: todo-note
  pattern: '(?<![A-Za-z0-9_])(TODO|FIXME|BUG|HACK|NOTE|XXX|OPTIMIZE|REVIEW)(?![A-Za-z0-9_])'
  color: '#d29922'
  bold: true
- name: multiline-string
  pattern: '^[[:space:]]*\\\\.*$'
  color: '#a5d6ff'
- name: string
  pattern: '"(?:\\.|[^"\\])*"'
  color: '#a5d6ff'
- name: import-builtin
  pattern: '@import(?=[[:space:]]*\()'
  color: '#ff7b72'
  bold: true
- name: import-path
  pattern: '@import[[:space:]]*\([[:space:]]*"[^"]+"[[:space:]]*\)'
  color: '#a5d6ff'
- name: character
  pattern: "'(?:\\\\.|[^'\\\\])'"
  color: '#a5d6ff'
- name: escape-sequence
  pattern: '\\(?:[nrt\\''"]|x[0-9A-Fa-f]{2}|u\{[0-9A-Fa-f]{1,6}\})'
  color: '#79c0ff'
  bold: true
- name: builtin-function
  pattern: '@[A-Za-z_][A-Za-z0-9_]*'
  color: '#d2a8ff'
  bold: true
- name: control-keyword
  pattern: '(?<![A-Za-z0-9_])(break|catch|continue|defer|else|errdefer|for|if|orelse|return|switch|try|unreachable|while)(?![A-Za-z0-9_])'
  color: '#ff7b72'
  bold: true
- name: declaration-keyword
  pattern: '(?<![A-Za-z0-9_])(const|var|fn|pub|export|extern|test|usingnamespace|threadlocal)(?![A-Za-z0-9_])'
  color: '#ff7b72'
  bold: true
- name: type-keyword
  pattern: '(?<![A-Za-z0-9_])(struct|enum|union|opaque|packed|extern|anytype|anyframe|anyerror|anyopaque|type|void|noreturn|bool|comptime_int|comptime_float|isize|usize|c_char|c_short|c_ushort|c_int|c_uint|c_long|c_ulong|c_longlong|c_ulonglong|c_longdouble|f16|f32|f64|f80|f128|i[0-9]+|u[0-9]+)(?![A-Za-z0-9_])'
  color: '#ffa657'
  bold: true
- name: error-keyword
  pattern: '(?<![A-Za-z0-9_])error(?![A-Za-z0-9_])'
  color: '#ff7b72'
  bold: true
- name: modifier-keyword
  pattern: '(?<![A-Za-z0-9_])(addrspace|align|allowzero|callconv|comptime|inline|linksection|noalias|noinline|nosuspend|volatile)(?![A-Za-z0-9_])'
  color: '#ff7b72'
  bold: true
- name: async-keyword
  pattern: '(?<![A-Za-z0-9_])(async|await|resume|suspend)(?![A-Za-z0-9_])'
  color: '#ff7b72'
  bold: true
- name: primitive-type
  pattern: '(?<![A-Za-z0-9_])(anyerror|anyopaque|bool|comptime_float|comptime_int|f16|f32|f64|f80|f128|i[0-9]+|u[0-9]+|isize|usize|noreturn|void|c_char|c_short|c_ushort|c_int|c_uint|c_long|c_ulong|c_longlong|c_ulonglong|c_longdouble)(?![A-Za-z0-9_])'
  color: '#79c0ff'
  bold: true
- name: boolean-null-undefined
  pattern: '(?<![A-Za-z0-9_])(true|false|null|undefined)(?![A-Za-z0-9_])'
  color: '#79c0ff'
  bold: true
- name: error-value
  pattern: '(?<![A-Za-z0-9_])error\.[A-Za-z_][A-Za-z0-9_]*'
  color: '#f85149'
- name: enum-literal
  pattern: '(?<![A-Za-z0-9_])\.[A-Za-z_][A-Za-z0-9_]*'
  color: '#79c0ff'
- name: number-hex-float
  pattern: '(?<![A-Za-z0-9_])0[xX](?:[0-9A-Fa-f](?:_?[0-9A-Fa-f])*)?(?:\.(?:[0-9A-Fa-f](?:_?[0-9A-Fa-f])*)?)?[pP][+-]?[0-9](?:_?[0-9])*(?![A-Za-z0-9_])'
  color: '#79c0ff'
- name: number-hex
  pattern: '(?<![A-Za-z0-9_])0[xX][0-9A-Fa-f](?:_?[0-9A-Fa-f])*(?![A-Za-z0-9_])'
  color: '#79c0ff'
- name: number-binary
  pattern: '(?<![A-Za-z0-9_])0[bB][01](?:_?[01])*(?![A-Za-z0-9_])'
  color: '#79c0ff'
- name: number-octal
  pattern: '(?<![A-Za-z0-9_])0[oO][0-7](?:_?[0-7])*(?![A-Za-z0-9_])'
  color: '#79c0ff'
- name: number-float
  pattern: '(?<![A-Za-z0-9_])(?:(?:[0-9](?:_?[0-9])*)?\.[0-9](?:_?[0-9])*(?:[eE][+-]?[0-9](?:_?[0-9])*)?|[0-9](?:_?[0-9])*[eE][+-]?[0-9](?:_?[0-9])*)(?![A-Za-z0-9_])'
  color: '#79c0ff'
- name: number-decimal
  pattern: '(?<![A-Za-z0-9_])[0-9](?:_?[0-9])*(?![A-Za-z0-9_])'
  color: '#79c0ff'
- name: function-declaration
  pattern: '(?<![A-Za-z0-9_])fn[[:space:]]+[A-Za-z_][A-Za-z0-9_]*'
  color: '#d2a8ff'
  bold: true
- name: function-call
  pattern: '(?<![A-Za-z0-9_])(?!(if|for|while|switch|catch)[[:space:]]*\()[A-Za-z_][A-Za-z0-9_]*[[:space:]]*(?=\()'
  color: '#d2a8ff'
- name: type-name
  pattern: '(?<![A-Za-z0-9_])[A-Z][A-Za-z0-9_]*(?![A-Za-z0-9_])'
  color: '#ffa657'
- name: member-access
  pattern: '\.[A-Za-z_][A-Za-z0-9_]*'
  color: '#ffa657'
- name: label
  pattern: '(?<![A-Za-z0-9_])[A-Za-z_][A-Za-z0-9_]*[[:space:]]*:(?!:)'
  color: '#d29922'
- name: quoted-identifier
  pattern: '@"[A-Za-z_][^"]*"'
  color: '#a5d6ff'
- name: container-declaration
  pattern: '(?<![A-Za-z0-9_])(struct|enum|union|opaque)[[:space:]]*\{'
  color: '#ff7b72'
  bold: true
- name: payload-capture
  pattern: '\|[A-Za-z_][A-Za-z0-9_]*(?:[[:space:]]*,[[:space:]]*[A-Za-z_][A-Za-z0-9_]*)?\|'
  color: '#ffa657'
- name: label-reference
  pattern: ':[A-Za-z_][A-Za-z0-9_]*'
  color: '#d29922'
- name: operator-word
  pattern: '(?<![A-Za-z0-9_])(and|or)(?![A-Za-z0-9_])'
  color: '#e6edf3'
- name: operator
  pattern: '(\+%|\-%|\*%|\+|\-|\*|/|%|==|!=|<=|>=|<<|>>|&|\||\^|~|!|=|\+=|-=|\*=|/=|%=|<<=|>>=|&=|\|=|\^=|\?|\.\*|\.\?)'
  color: '#e6edf3'
- name: bracket
  pattern: '[{}\[\]()]'
  color: '#e6edf3'
- name: punctuation
  pattern: '[,;:]'
  color: '#8b949e'
