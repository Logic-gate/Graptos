name: Rust
extensions: [.rs]
line_comment: "//"
auto_indent: true
indent_openers: ["{"]
indent_closers: ["}"]
close_pairs: ["(=>)", "{=>}", "[=>]"]
icon: mime
filenames: [Cargo.toml, Cargo.lock]
index: true
import_style: generic
import_keywords: [use, mod]
import_from_keywords: []
import_member_keywords: []
import_roots: [., src]
import_env: []
import_extensions: [.rs]
import_member_files: [mod.rs, lib.rs, main.rs]
import_strip_extensions: true
import_dot_modules: false
completions: [as, async, await, break, const, continue, crate, dyn, else, enum, extern, false, fn, for, if, impl, in, let, loop, match, mod, move, mut, pub, ref, return, self, Self, static, struct, super, trait, true, type, unsafe, use, where, while, Result, Option, Some, None, Ok, Err, String, Vec, Box, HashMap, HashSet, println, format, derive, Debug, Clone]
line_close_pairs: []
statement_required_enders: []
statement_exempt_prefixes: ["//", "/*", "*", "}", "{", "else", "match ", "if ", "for ", "while ", "loop", "fn ", "impl ", "trait ", "struct ", "enum ", "use ", "mod "]
statement_exempt_suffixes: [";", "{", "}", ",", ":", "*/"]
rules:
  - name: comment-block
    pattern: "/\\*[^*]*\\*+(?:[^/*][^*]*\\*+)*/"
    color: "#6A9955"
  - name: comment-line
    pattern: "//.*$"
    color: "#6A9955"
  - name: string
    pattern: "\"(?:\\\\.|[^\"\\\\])*\"|'(?:\\\\.|[^'\\\\])*'"
    color: "#CE9178"
  - name: keyword
    pattern: "(?<![A-Za-z0-9_])(as|async|await|break|const|continue|crate|dyn|else|enum|extern|false|fn|for|if|impl|in|let|loop|match|mod|move|mut|pub|ref|return|self|Self|static|struct|super|trait|true|type|unsafe|use|where|while)(?![A-Za-z0-9_])"
    color: "#569CD6"
    bold: true
    italic: true
  - name: type
    pattern: "(?<![A-Za-z0-9_])(Result|Option|Some|None|Ok|Err|String|Vec|usize|isize|u8|u16|u32|u64|i8|i16|i32|i64|bool|str)(?![A-Za-z0-9_])"
    color: "#4EC9B0"
