version: 1
id: zig-cli
name: Zig Command-Line Application
description: Basic Zig application with build.zig and optional tests. It's better to use zig init
language: Zig

variables:
  executable_name:
    label: Executable name
    type: text
    default: ${project_slug}

  include_tests:
    label: Include tests
    type: boolean
    default: true

  initialize_git:
    label: Initialize Git repository
    type: boolean
    default: true

  license:
    label: License
    type: choice
    values: [AGPL-3.0, MIT, Apache-2.0]
    default: AGPL-3.0

directories:
  - src
  - path: test
    when: include_tests

files:
  - path: build.zig
    template: files/build.zig

  - path: src/main.zig
    template: files/main.zig

  - path: test/main_test.zig
    template: files/main_test.zig
    when: include_tests

  - path: README.md
    template: files/README.md

  - path: .gitignore
    template: files/gitignore

actions:
  - type: git-init
    when: initialize_git

open:
  project: .
  file: src/main.zig
