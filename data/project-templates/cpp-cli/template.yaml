version: 1
id: cpp-cli
name: C++ Command-Line Application
description: C++ application with Make, CMake, or Meson build files and optional tests.
language: C++

variables:
  build_system:
    label: Build system
    type: choice
    values: [make, cmake, meson]
    default: cmake

  executable_name:
    label: Executable name
    type: text
    default: ${project_slug}

  include_tests:
    label: Include tests
    type: boolean
    default: true

  initialize_git:
    label: Initialize Git repository
    type: boolean
    default: true

  license:
    label: License
    type: choice
    values: [AGPL-3.0, MIT, Apache-2.0]
    default: AGPL-3.0

directories:
  - src
  - include
  - path: tests
    when: include_tests

files:
  - path: src/main.cpp
    template: files/main.cpp

  - path: include/${project_ident}.hpp
    template: files/project.hpp

  - path: tests/test_main.cpp
    template: files/test_main.cpp
    when: include_tests

  - path: Makefile
    template: files/Makefile
    when: build_system == "make"

  - path: CMakeLists.txt
    template: files/CMakeLists.txt
    when: build_system == "cmake"

  - path: meson.build
    template: files/meson.build
    when: build_system == "meson"

  - path: README.md
    template: files/README.md

  - path: .gitignore
    template: files/gitignore

actions:
  - type: git-init
    when: initialize_git

open:
  project: .
  file: src/main.cpp
